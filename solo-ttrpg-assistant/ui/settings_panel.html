<div class="solo-ttrpg-assistant">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Solo TTRPG Assistant</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="solo-grid">
                <section class="solo-section solo-stack">
                    <div class="solo-row spread">
                        <h4>Pack</h4>
                        <span class="solo-badge" id="solo-pack-status">Unknown pack mode</span>
                    </div>
                    <p class="solo-muted" id="solo-pack-description">Load a genre pack to enable the structured sheet, attribute rolls, and ability catalog.</p>
                    <p class="solo-muted" id="solo-pack-picker-mode"></p>
                    <div class="solo-row wrap">
                        <button id="solo-pack-load" class="menu_button">Load Pack</button>
                        <button id="solo-pack-reload" class="menu_button">Reload Pack</button>
                    </div>
                    <label class="solo-stack">
                        <span>Active pack</span>
                        <select id="solo-pack-select"></select>
                    </label>
                    <input id="solo-pack-input" type="file" webkitdirectory multiple hidden />
                </section>

                <section class="solo-section solo-stack">
                    <div class="solo-row spread">
                        <h4>Character Sheet</h4>
                        <span class="solo-muted" id="solo-sheet-mode"></span>
                    </div>
                    <label class="solo-stack">
                        <span>Active character</span>
                        <select id="solo-character-select"></select>
                    </label>
                    <div class="solo-row wrap">
                        <button id="solo-character-new" class="menu_button" type="button">New</button>
                        <button id="solo-character-duplicate" class="menu_button" type="button">Duplicate</button>
                        <button id="solo-character-delete" class="menu_button" type="button">Delete</button>
                    </div>
                    <div id="solo-sheet-root"></div>
                </section>

                <section class="solo-section solo-stack">
                    <div class="solo-row spread">
                        <h4>Actions</h4>
                    </div>
                    <div class="solo-actions">
                        <button id="solo-backup-export" class="menu_button">Export Backup</button>
                        <button id="solo-backup-import" class="menu_button">Import Backup</button>
                        <button id="solo-scene-end" class="menu_button">Scene End</button>
                        <button id="solo-act-transition" class="menu_button">Act Transition</button>
                    </div>
                    <input id="solo-backup-input" type="file" accept=".zip" hidden />
                </section>

                <section class="solo-section solo-stack">
                    <div class="solo-row spread">
                        <h4>Activity</h4>
                    </div>
                    <div id="solo-log-root" class="solo-log"></div>
                </section>
            </div>
        </div>
    </div>
</div>
