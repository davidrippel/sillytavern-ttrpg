<div id="solo-ttrpg-panel" class="solo-ttrpg-assistant">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Solo TTRPG Assistant</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="solo-shell">

                <div class="solo-row solo-row-spread">
                    <label class="solo-row">
                        <input type="checkbox" id="solo-enabled" />
                        <span>Enabled</span>
                    </label>
                    <span id="solo-active-pack-label" class="solo-muted"></span>
                </div>

                <!-- Campaign card -->
                <details class="solo-card" open>
                    <summary>Campaign &amp; Pack</summary>
                    <div class="solo-stack">
                        <div class="solo-row">
                            <select id="solo-pack-select" class="solo-grow"></select>
                            <button type="button" id="solo-pack-load" class="menu_button">Load pack…</button>
                        </div>
                        <div id="solo-pack-info" class="solo-muted solo-mini"></div>
                        <input type="file" id="solo-pack-files" webkitdirectory multiple style="display:none" />
                        <div class="solo-row">
                            <button type="button" id="solo-backup-export" class="menu_button solo-grow">Export backup…</button>
                            <button type="button" id="solo-backup-import" class="menu_button solo-grow">Import backup…</button>
                            <input type="file" id="solo-backup-file" accept=".json" style="display:none" />
                        </div>
                    </div>
                </details>

                <!-- Character card -->
                <details class="solo-card" open>
                    <summary>Character</summary>
                    <div class="solo-stack">
                        <div class="solo-row">
                            <select id="solo-character-select" class="solo-grow"></select>
                            <button type="button" id="solo-character-new" class="menu_button">+ New</button>
                            <button type="button" id="solo-character-duplicate" class="menu_button">Duplicate</button>
                            <button type="button" id="solo-character-delete" class="menu_button solo-danger">Delete</button>
                        </div>
                        <div class="solo-row">
                            <input type="text" id="solo-character-rename" class="solo-grow" placeholder="Rename active character" />
                            <button type="button" id="solo-character-rename-go" class="menu_button">Rename</button>
                        </div>
                        <div class="solo-row">
                            <button type="button" id="solo-persona-link" class="menu_button">Link persona</button>
                            <span id="solo-persona-status" class="solo-muted solo-mini"></span>
                        </div>
                        <div class="solo-row">
                            <button type="button" id="solo-sample-import" class="menu_button solo-grow">Import pregen from campaign…</button>
                            <input type="file" id="solo-sample-file" accept=".json,application/json" style="display:none" />
                        </div>
                        <div id="solo-sheet-root" class="solo-sheet-root"></div>
                    </div>
                </details>

                <!-- Story card -->
                <details class="solo-card" open>
                    <summary>Story</summary>
                    <div class="solo-stack">
                        <div class="solo-row solo-row-spread">
                            <span id="solo-turn-label" class="solo-muted"></span>
                            <div class="solo-row">
                                <button type="button" id="solo-rewind" class="menu_button">Rewind to turn…</button>
                                <button type="button" id="solo-reset-campaign" class="menu_button solo-danger">Reset campaign…</button>
                            </div>
                        </div>
                        <div>
                            <h4 class="solo-h4">Live threads</h4>
                            <ul id="solo-threads-list" class="solo-list"></ul>
                            <button type="button" id="solo-thread-add" class="menu_button">+ Add thread</button>
                        </div>
                        <div>
                            <h4 class="solo-h4">Recent facts</h4>
                            <ul id="solo-facts-list" class="solo-list"></ul>
                        </div>
                        <div>
                            <h4 class="solo-h4">Truths revealed</h4>
                            <ul id="solo-truths-list" class="solo-list"></ul>
                        </div>
                        <div>
                            <h4 class="solo-h4">Scene</h4>
                            <div id="solo-scene" class="solo-muted"></div>
                        </div>
                    </div>
                </details>

                <!-- Director card -->
                <details class="solo-card">
                    <summary>Director</summary>
                    <div class="solo-stack">
                        <label class="solo-row">
                            <input type="checkbox" id="solo-extractor-enabled" />
                            <span>Run fact extractor after every assistant message</span>
                        </label>
                        <label class="solo-row">
                            <input type="checkbox" id="solo-ui-chips" />
                            <span>Show inline fact chips under messages</span>
                        </label>
                        <label class="solo-row">
                            <input type="checkbox" id="solo-ui-tray" />
                            <span>Show threads tray above chat</span>
                        </label>
                        <div>
                            <h4 class="solo-h4">Add a fact manually</h4>
                            <textarea id="solo-manual-fact" rows="2" placeholder="Type a fact the GM established but the extractor missed."></textarea>
                            <button type="button" id="solo-manual-fact-add" class="menu_button">Add fact</button>
                        </div>
                        <div>
                            <h4 class="solo-h4">Active director's note</h4>
                            <div id="solo-active-note" class="solo-muted"></div>
                        </div>
                        <div>
                            <h4 class="solo-h4">Pressure cue</h4>
                            <div id="solo-pressure-cue" class="solo-muted"></div>
                        </div>
                        <button type="button" id="solo-an-rebuild" class="menu_button">Rebuild Author's Note from state</button>
                    </div>
                </details>

                <!-- Debug card -->
                <details class="solo-card">
                    <summary>Debug</summary>
                    <div class="solo-stack">
                        <div class="solo-row">
                            <button type="button" id="solo-log-clear" class="menu_button">Clear log</button>
                            <button type="button" id="solo-state-dump" class="menu_button">Dump state to log</button>
                        </div>
                        <pre id="solo-log" class="solo-log"></pre>
                    </div>
                </details>

            </div>
        </div>
    </div>
</div>
